# yaml-language-server: $schema=../schema/experiment.schema.json
# ========================================================
# General experiment settings
# ========================================================
experiment:
  mode: train  # 'train'
  exp_name: UnetRcan_clip_charEdge_recon2
  overwrite: false # mainly for debug; to overwrite any exp_name with the same name
  post_training_inference: true

# ========================================================
# Paths
# ========================================================
routing:
  data_subfolder: "preprocess/recon_2"
  models_subfolder: "Denoising"
  tensorboard_subfolder: ""
  # used only for non-canonical loads => full path is used directly
  dataset_full_path: ""

# ========================================================
# Dataset / DataLoader configuration
# ========================================================
data:
  dataset_name: vim_fixed
  data_format: single
  canonical_load: true
  prep_before: true
  already_split: true
  filters:
    - tiff
    - tif

  paired: true
  target: "gt_avg" # for paired datasets
  input: "inp_single"

  patch_size: 64
  val_patch_size: 256
  batch_size: 64

  # options
  initial_crop: null
  augmentation: false
  patch_thresh: 0.1 # None or float [0,1]
  select_on_gt: false

normalization:
  norm_prm:
    clip: 0

# ========================================================
# Model configuration
# ========================================================
model:
  architecture: unet_rcan
  parameters:
    upsampling_factor: 1
    UNet_prm:
      feat: 64
      depth: 3
      in_channels: 1
      out_channels: 1
      activation: swish
      norm: group
      gr_norm: 8
      dropout: 0.1
      cab_skip_con: false
      remove_skip_con: 1
    RCAN_prm:
      in_channels: 2
      num_features: 64
      num_rg: 8
      num_rcab: 12
      reduction: 16
      dropout: 0.1

# ========================================================
# Training configuration
# ========================================================
training:
  n_epochs: 100
  batch_size: 16
  learning_rate: 0.0001
  optimizer: Adam
  scheduler: null
  progress_bar: true
  debug_stop: false
  warmup:
    enabled: false
    steps: 500
    start_factor: 0.1
  auto_stop:
    enabled: true
    metrics: val_loss
    patience: 30

loss_function:
  name: CharEdge
  CharEdge_loss_prm:
    alpha: 0.05
  
# ========================================================
# Saving configuration
# ========================================================
saving:
  enabled: true
  canonical_save: true
  overwrite_best: true
  save_last: true
  entire_model: true
  state_dict: true
  validation_images: true
  validation_freq: 10  # save every Xth epoch

# ========================================================
# Tensorboard configuration
# ========================================================
tensorboard:
  enabled: false
  validation_images: true
