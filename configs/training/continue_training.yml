# yaml-language-server: $schema=../schema/continue_training.schema.json
# ========================================================
# Continue training configuration
# This mode resumes optimization in the original run directory.
# The original experiment name, model, data, routing, and loss settings
# are reused automatically and cannot be overridden here.
# ========================================================
experiment:
  mode: continue_training
  post_training_inference: true

# ========================================================
# Model loading
# Required: selects the existing run to resume in-place.
# ========================================================
load_model:
  canonical_load: true
  dataset_name: Gag_noisy_timelapses
  subfolder: HDN
  exp_name: HDN_Gag_BetaKL07_NoClipGrad_batch8_lr1e-5_02
  load_method: state_dict
  best_or_last: last

# ========================================================
# Training overrides
# Only include values you want to change for the resumed run.
# ========================================================
training:
  n_epochs: 100
  # learning_rate: 1e-8
  # early_stop: false

# ========================================================
# Saving configuration
# ========================================================
# saving:
#   enabled: true
#   state_dict: true
#   entire_model: true

