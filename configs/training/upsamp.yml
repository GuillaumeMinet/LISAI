# yaml-language-server: $schema=../schema/experiment.schema.json
# ========================================================
# General experiment settings
# ========================================================
experiment:
  mode: train  # 'train'
  exp_name: CL5_Upsamp2_biggerNet
  overwrite: false # mainly for debug; to overwrite any exp_name with the same name
  post_training_inference: true

# ========================================================
# Paths
# ========================================================
routing:
  data_subfolder: "preprocess/recon"
  models_subfolder: "Upsamp"
  tensorboard_subfolder: "Upsamp"
  # used only for non-canonical loads => full path is used directly
  dataset_full_path: ""

# ========================================================
# Dataset / DataLoader configuration
# ========================================================
data:
  dataset_name: Gag_timelapses
  data_format: timelapse
  canonical_load: true
  prep_before: true
  already_split: true
  filters:
    - tiff
    - tif

  paired: false
  target: null # for paired datasets
  input: ""
  timelapse_prm:
      timelapse_max_frames: 20
      context_length: 5

  patch_size: 96
  val_patch_size: 240
  batch_size: 64

  downsampling:
    downsamp_factor: 2
    downsamp_method: "random"

  # options
  initial_crop: null
  augmentation: false
  patch_thresh: 0.15 # None or float [0,1]
  select_on_gt: false

# ========================================================
# Model configuration
# ========================================================
model:
  architecture: unet_rcan
  parameters:
    upsampling_net: rcan
    upsampling_factor: 2
    UNet_prm:
      feat: 64
      depth: 3
      in_channels: 5
      out_channels: 5
      activation: swish
      norm: group
      gr_norm: 8
      dropout: 0.1
      cab_skip_con: false
    RCAN_prm:
      num_features: 64
      num_rg: 8
      num_rcab: 12
      reduction: 16
      dropout: 0.1
      upsamp_kernel_factor: 1

# ========================================================
# Training configuration
# ========================================================
training:
  n_epochs: 60
  batch_size: 8
  learning_rate: 0.0001
  val_loss_patience: 30
  optimizer: Adam
  scheduler: ReduceLROnPlateau
  progress_bar: true
  early_stop: false

loss_function:
  name: CharEdge_loss
  CharEdge_loss_prm:
    alpha: 0.05

# ========================================================
# Saving configuration
# ========================================================
saving:
  enabled: true
  canonical_save: true
  overwrite_best: true
  save_last: true
  entire_model: true
  state_dict: true
  validation_images: true
  validation_freq: 10  # save every Xth epoch

# ========================================================
# Tensorboard configuration
# ========================================================
tensorboard:
  enabled: false
  validation_images: true