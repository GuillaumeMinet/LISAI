# yaml-language-server: $schema=../schema/retrain.schema.json
# ========================================================
# Retrain configuration
# This mode starts a new run from weights loaded from an older run.
# You can override data, normalization, noise model, loss, and training
# settings, but the source model architecture is reused.
# ========================================================
experiment:
  mode: retrain
  exp_name: ContinueFromFixed
  overwrite: false
  post_training_inference: true

# ========================================================
# Model loading
# Required: selects the source run that provides the starting weights.
# ========================================================
load_model:
  canonical_load: true
  dataset_name: vim_fixed
  subfolder: Upsamp
  exp_name: Snr0_Upsamp2_05
  load_method: state_dict
  best_or_last: best

# ========================================================
# Paths
# ========================================================
routing:
  data_subfolder: preprocess/recon_smaller
  models_subfolder: Upsamp

# ========================================================
# Dataset / DataLoader configuration
# Optional: override this section when transferring to a new dataset.
# ========================================================
data:
  dataset_name: vim_live
  data_format: timelapse
  canonical_load: true
  prep_before: true
  already_split: true
  filters:
    - tiff
    - tif

  paired: false
  target: null # for paired datasets
  input: ""
  timelapse_prm:
    timelapse_max_frames: 3
    shuffle: false

  patch_size: 96
  val_patch_size: 240
  batch_size: 64

# ========================================================
# Normalization / Noise
# Optional: useful when the retrain target dataset changes.
# ========================================================
# normalization:
#   load_from_noise_model: true
#   norm_prm: null

# noise_model:
#   name: null

# ========================================================
# Training configuration
# ========================================================
