# =================================== #
# LISAI - Project-level configuration #
# =================================== #

project:
  name: lisai

paths:
  roots:
    data_dir: "{data_root}/datasets"
    noise_models_dir: "{data_root}/noise_models"
    # code_dir is injected automatically by Settings (project root)

  templates:
    dataset_registry: "{paths.roots.data_dir}/dataset_registry.yml"

    dataset_loading: "{paths.roots.data_dir}/{dataset_name}/{data_subfolder}"

    # run_dir = training dir, where checkpoints, training curves, validation images, etc. are saved
    run_dir: "{paths.roots.data_dir}/{dataset_name}/models/{models_subfolder}/{exp_name}"

    tensorboard_runs_dir: "{paths.roots.code_dir}/tensorboard/{dataset_name}/{tensorboard_subfolder}"

    predictreal_saving: "{paths.roots.data_dir}/{dataset_name}/inference/{inference_subfolder}/{exp_name}"

    noise_model: "{paths.roots.noise_models_dir}/{noiseModel_name}/GMM.npz"

run_layout:
  subdirs:
    checkpoints: "checkpoints"
    validation_images: "validation_images"
    retrain_origin: "retrain_origin"

  artifacts:
    loss_file: "loss.txt"
    loss_plot: "loss_plot.png"
    train_log: "train_log.log"
    config_train: "config_train.yaml"

  retrain_origin_artifacts:
    loss_file: "origin_loss.txt"
    train_log: "origin_log.log"
    config_train: "origin_config.yaml"

naming:
  exp_name_format: "{name}_{id:02d}"
  sample_id: "c{id:02d}"
  run_dir_index_width: 2

run_tracking:
  active_heartbeat_timeout_minutes: 10

recovery:
  hdn_safe_resume:
    enabled: true
    auto_use_safe_checkpoint_on_continue: true
    drop_optimizer_scheduler_state_on_safe_resume: true
    rewind_steps: 2
    lr_scale: 0.1
    min_lr: 1.0e-8
    max_compound_steps: None
    force_grad_clip_max_norm: None

queue:
  resource_class_vram_mb:
    light: 3000
    medium: 6000
    heavy: 9000
  fixed_margin_pct: 0.20
  safety_margin_mb: 2000
  poll_seconds: 5
  paused: false
  max_concurrent_runs_per_gpu: 1
