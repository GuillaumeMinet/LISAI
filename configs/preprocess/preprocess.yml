# yaml-language-server: $schema=../schema/preprocess.schema.json
dataset_name: "Gag_noisy_single"
pipeline: "single_recon"
data_type: "recon"
fmt: "single"

pipeline_cfg:
  dump_subfolder: ""
  combine_subfolders: false
  crop_size: 1200

log:
  enabled: true

split:
  enabled: true
  mode: "manual"
  random:
    seed: 0
    val_fraction: 0.2
    test_fraction: 0.2
  manual:
    match_by: "source_name"
    val: ["Stack4","Stack5"]
    test: []
  reuse: null
