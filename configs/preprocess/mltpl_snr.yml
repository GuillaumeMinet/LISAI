# yaml-language-server: $schema=../schema/preprocess.schema.json
dataset_name: "actin_fixed"
pipeline: "recon_mltpl_snr"
data_type: "recon"
fmt: "mltpl_snr"

pipeline_cfg:
  dump_subfolder: ""
  combine_subfolders: False
  crop_size: null
  first_low_inp: false
  gt_avg_n_frames: 5
  gt_types: ["snr0","avg"]

  
log:
  enabled: true

split:
  enabled: true
  mode: "manual"
  random:
    seed: 0
    val_fraction: 0.2
    test_fraction: 0.2
  manual:
    match_by: "sample_id"
    val: ["c00","c07"]
    test: ["c21","c25","c26","c27","c30"]
  reuse: null
