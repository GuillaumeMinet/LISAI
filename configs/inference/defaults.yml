# yaml-language-server: $schema=../schema/inference-defaults.schema.json
apply:
  save_folder: default
  in_place: false
  epoch_number: null
  best_or_last: best
  filters:
    - tiff
    - tif
  skip_if_contain: null
  crop_size: null
  keep_original_shape: true
  tiling_size: 400
  stack_selection_idx: null
  timelapse_max: null
  lvae_num_samples: 50
  lvae_save_samples: true
  denormalize_output: true
  save_inp: true
  downsamp: null
  fill_factor: null
  apply_color_code: false
  color_code_prm:
    colormap: turbo
    saturation: 0.35
    add_colorbar: true
    zstep: 0.4
  dark_frame_context_length: false

evaluate:
  best_or_last: best
  epoch_number: null
  tiling_size: null
  crop_size: null
  metrics_list: null
  lvae_num_samples: 20
  save_folder: null
  overwrite: false
  eval_gt: null
  data_prm_update:
    timelapse_prm:
      timelapse_max_frames: null
      shuffle: false
      
  # Keep one predicted channel by default; context windows are input-only.
  ch_out: 1
  split: test
  limit_n_imgs: null
