# yaml-language-server: $schema=../schema/experiment.schema.json
# ========================================================
# General experiment settings
# ========================================================
experiment:
  mode: train  # 'train', 'continue_training', 'retrain'
  exp_name: CL1_Upsamp2_RandomPx_UnetRCAN_rg8_rcab12_red16_CharEdge_alpha005
  overwrite: true # mainly for debug; to overwrite any exp_name with the same name

# ========================================================
# Paths
# ========================================================
routing:
  data_subfolder: "preprocess/recon"
  models_subfolder: "Upsamp"
  tensorboard_subfolder: "Upsamp"
  # used only for non-canonical loads => full path is used directly
  dataset_full_path: ""

# ========================================================
# Dataset / DataLoader configuration
# ========================================================
data:
  dataset_name: Gag
  data_format: timelapse
  canonical_load: true
  prep_before: true
  already_split: true
  filters:
    - tiff
    - tif
  
  paired: false
  target: null # for paired datasets
  input: ""
  timelapse_prm:
      timelapse_max_frames: 5
      context_length: null

  patch_size: 96
  val_patch_size: 240
  batch_size: 64
  
  downsampling:
    downsamp_factor: 2
    downsamp_method: "random"

  # options
  initial_crop: null
  augmentation: false
  patch_thresh: 0.15 # None or float [0,1]
  select_on_gt: false

# ========================================================
# Model configuration
# ========================================================
model:
  architecture: unet
  parameters:
      feat: 32
      depth: 2
      in_channels: 1
      out_channels: 1
      activation: swish
      norm: group
      gr_norm: 8
      dropout: 0.1
      upsampling_factor: 2
      upsampling_order: after
    # upsampling_net: rcan
    # upsampling_factor: 2
    # UNet_prm:
    #   feat: 32
    #   depth: 2
    #   in_channels: 1
    #   out_channels: 1
    #   activation: swish
    #   norm: group
    #   gr_norm: 8
    #   dropout: 0.1
    #   cab_skip_con: false
    # RCAN_prm:
    #   num_features: 16
    #   num_rg: 4
    #   num_rcab: 4
    #   reduction: 4
    #   dropout: 0.1
    #   upsamp_kernel_factor: 1

# ========================================================
# Training configuration
# ========================================================
training:
  n_epochs: 100
  batch_size: 8
  learning_rate: 0.0001
  val_loss_patience: 30
  optimizer: Adam
  scheduler: ReduceLROnPlateau
  progress_bar: true
  early_stop: false

loss_function:
  name: CharEdge_loss
  CharEdge_loss_prm:
    alpha: 0.05

# ========================================================
# Model loading (for continue_training / retrain)
# ========================================================
load_model:
  canonical_load: false
  dataset_name: Gag
  subfolder: Upsamp
  exp_name: null
  model_name: null
  model_full_path: null
  load_method: state_dict  # 'state_dict' or 'full_model'

# ========================================================
# Saving configuration
# ========================================================
saving:
  enabled: true
  canonical_save: true
  overwrite_best: true
  save_last: true
  entire_model: true
  state_dict: true
  validation_images: true
  validation_freq: 10  # save every Xth epoch

# ========================================================
# Tensorboard configuration
# ========================================================
tensorboard:
  enabled: false
  validation_images: true
